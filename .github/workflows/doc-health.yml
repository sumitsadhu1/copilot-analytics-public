name: Doc Health Check

# Internal-integrity checks for the documentation hub: broken internal links,
# missing anchors, stale/mismatched PDFs, search-index health, duplicate ids,
# and leaked secrets. Complements fact-check.yml (which watches upstream MS Learn
# pages for content drift).

on:
  push:
    branches: [main]
    paths:
      - '1-strategy/**'
      - '2-setup/**'
      - '3-operate/**'
      - '4-reference/**'
      - 'decide/**'
      - 'explain/**'
      - 'artifacts/**'
      - 'docs/**'
      - 'index.html'
      - 'browse.html'
      - 'assets/search-index.json'
      - 'scripts/**'
      - '.github/workflows/doc-health.yml'
  pull_request:
    paths:
      - '1-strategy/**'
      - '2-setup/**'
      - '3-operate/**'
      - '4-reference/**'
      - 'decide/**'
      - 'explain/**'
      - 'artifacts/**'
      - 'docs/**'
      - 'index.html'
      - 'browse.html'
      - 'assets/search-index.json'
      - 'scripts/**'
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC — weekly outbound-link sweep
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  doc-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git-commit-time PDF staleness works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test the checker
        run: python3 scripts/maintenance/test_check_docs.py

      # Blocking: deterministic local checks. --ci uses git commit times for PDF
      # staleness (file mtimes are meaningless after a fresh checkout); --strict
      # makes a stale/mismatched PDF or config drift fail the build, enforcing the
      # "regenerate PDFs in the same commit as the HTML" convention.
      - name: Doc-health checks (links, PDFs, index, structure, secrets)
        run: python3 scripts/maintenance/check_docs.py --ci --strict

      - name: Restore outbound-link cache
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@v4
        with:
          path: scripts/maintenance/link-cache.json
          key: doc-health-linkcache-${{ github.run_id }}
          restore-keys: doc-health-linkcache-

      # Non-blocking: probing live URLs is network-dependent and occasionally
      # flaky, so it never fails the build — it reports and opens an issue instead.
      - name: Outbound link sweep (weekly / manual)
        id: external
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python3 scripts/maintenance/check_docs.py --external --ci

      - name: Open issue on broken outbound links
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && steps.external.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(
              fs.readFileSync('scripts/maintenance/last-report.json', 'utf8'));
            const broken = (report.findings || [])
              .filter(x => x.check === 'external' && x.severity === 'ERROR');
            if (broken.length === 0) return;
            let body = '## Doc Health — broken outbound links\n\n';
            body += `Run ${context.sha.substring(0, 7)} on `
                 +  `${new Date().toISOString().split('T')[0]} found `
                 +  `${broken.length} broken external link(s):\n\n`;
            for (const b of broken) body += `- \`${b.file}:${b.line}\` — ${b.message}\n`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Doc Health: ${broken.length} broken outbound link(s)`,
              body,
            });
