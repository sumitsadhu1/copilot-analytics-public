name: MS Learn Fact Check

on:
  push:
    branches: [main]
    paths:
      - '1-strategy/**'
      - '2-setup/**'
      - '3-operate/**'
      - '4-reference/**'
      - 'decide/**'
      - 'explain/**'
      - 'artifacts/*.html'
      - 'scripts/fact-check/**'
  workflow_dispatch:  # manual trigger for weekly runs or ad-hoc checks

jobs:
  fact-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: scripts/fact-check/snapshots
          key: fact-check-snapshots-${{ github.sha }}
          restore-keys: |
            fact-check-snapshots-

      - name: Run fact checker
        id: check
        continue-on-error: true
        run: |
          python3 scripts/fact-check/check_facts.py --verbose --update-snapshots 2>&1 | tee fact-check-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Create issue on discrepancies
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('fact-check-output.txt', 'utf8');
            const report = JSON.parse(fs.readFileSync('scripts/fact-check/last-report.json', 'utf8'));

            let body = '## MS Learn Fact Check — Discrepancies Found\n\n';
            body += `**Run:** ${context.sha.substring(0, 7)} on ${new Date().toISOString().split('T')[0]}\n\n`;

            if (report.fact_discrepancies && report.fact_discrepancies.length > 0) {
              body += '### Fact Discrepancies\n\n';
              for (const d of report.fact_discrepancies) {
                body += `- **[${d.severity.toUpperCase()}] ${d.id}**: ${d.claim}\n`;
                body += `  - Missing terms: \`${d.missing_terms.join('`, `')}\`\n`;
                body += `  - Source: [${d.source_page}](${d.source_url})\n`;
                body += `  - Our files: ${d.our_files.join(', ')}\n`;
                if (d.scenarios_affected && d.scenarios_affected.length > 0) {
                  body += `  - Scenarios affected: ${d.scenarios_affected.join(', ')}\n`;
                }
                body += '\n';
              }
            }

            if (report.new_pages_detected && report.new_pages_detected.length > 0) {
              body += '### New MS Learn Pages Detected\n\n';
              for (const np of report.new_pages_detected) {
                body += `- [${np.url}](${np.url}) (found via ${np.discovered_from})\n`;
              }
              body += '\n';
            }

            if (report.pages_changed && report.pages_changed.length > 0) {
              body += '### MS Learn Pages Changed Since Last Check\n\n';
              for (const p of report.pages_changed) {
                body += `- **${p.id}**: [${p.title}](${p.url}) — last updated ${p.last_updated || 'unknown'}\n`;
                body += `  - Review: ${p.our_files.join(', ')}\n`;
              }
              body += '\n';
            }

            if (report.scenarios_affected && report.scenarios_affected.length > 0) {
              body += '### Scenarios That May Need Review\n\n';
              for (const s of report.scenarios_affected) {
                body += `- ${s}\n`;
              }
              body += '\n';
            }

            body += '<details><summary>Full output</summary>\n\n```\n' + output + '\n```\n</details>';

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fact-check',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `MS Learn Fact Check: ${report.fact_discrepancies.length} discrepancies, ${report.new_pages_detected.length} new pages`,
                body: body,
                labels: ['fact-check'],
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "### MS Learn Fact Check" >> $GITHUB_STEP_SUMMARY
          if [ -f scripts/fact-check/last-report.json ]; then
            python3 -c "
          import json
          r = json.load(open('scripts/fact-check/last-report.json'))
          print(f\"- Pages checked: {r['pages_checked']}\")
          print(f\"- Pages changed: {len(r['pages_changed'])}\")
          print(f\"- Facts verified: {r['facts_verified']}\")
          print(f\"- Discrepancies: {len(r['fact_discrepancies'])}\")
          print(f\"- New pages: {len(r['new_pages_detected'])}\")
          " >> $GITHUB_STEP_SUMMARY
          fi
